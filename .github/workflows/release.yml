name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to build and publish a GitHub release for
        required: true
        type: string
      publish_pypi:
        description: Also publish the distributions to PyPI
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.14"

      - name: Verify tag matches package version
        env:
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          python <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag_name = os.environ["TAG_NAME"]
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected_tag = f"v{version}"
          if tag_name != expected_tag:
              raise SystemExit(
                  f"Tag {tag_name!r} does not match project.version {version!r} "
                  f"(expected {expected_tag!r})."
              )
          PY

      - name: Build distribution artifacts
        run: uv build

      - name: Check distribution metadata
        run: uv tool run twine check dist/*

      - name: Smoke test wheel install
        run: uv run --isolated --no-project --with ./dist/*.whl python tests/smoke_check.py

      - name: Smoke test source distribution install
        run: uv run --isolated --no-project --with ./dist/*.tar.gz python tests/smoke_check.py

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ env.RELEASE_TAG }}
          path: dist/*
          if-no-files-found: error

      - name: Prune uv cache
        run: uv cache prune --ci

  publish_pypi:
    name: Publish to PyPI
    needs: build
    if: ${{ github.event_name == 'push' || inputs.publish_pypi == true }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pytest-fahhh/
    permissions:
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ env.RELEASE_TAG }}
          path: dist

      - name: Check whether this version already exists on PyPI
        id: pypi_version
        env:
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          python <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ["TAG_NAME"].removeprefix("v")
          exists = False

          try:
              with urllib.request.urlopen("https://pypi.org/pypi/pytest-fahhh/json") as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          else:
              exists = version in payload.get("releases", {})

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"exists={'true' if exists else 'false'}\n")
          PY

      - name: Publish distributions to PyPI
        if: steps.pypi_version.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Skip PyPI publish for versions that already exist
        if: steps.pypi_version.outputs.exists == 'true'
        run: echo "Version ${RELEASE_TAG} already exists on PyPI; skipping publish."

  github_release:
    name: Create GitHub release
    needs: [build, publish_pypi]
    if: ${{ always() && needs.build.result == 'success' && (needs.publish_pypi.result == 'success' || needs.publish_pypi.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ env.RELEASE_TAG }}
          path: dist

      - name: Create GitHub release with generated notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ env.RELEASE_TAG }}
          MARK_LATEST: ${{ github.event_name == 'push' && 'true' || 'false' }}
        run: |
          set -euo pipefail

          RELEASE_TITLE="$TAG_NAME"
          TARGET_SHA="$(git rev-list -n 1 "$TAG_NAME")"
          PREVIOUS_TAG="$(
            git tag -l 'v*' --sort=version:refname |
              awk -v target="$TAG_NAME" '$0 == target { print previous; exit } { previous = $0 }'
          )"
          NOTES_FILE="$(mktemp)"
          BASE_NOTES_FILE="$(mktemp)"
          PR_DETAILS_FILE="$(mktemp)"

          api_args=(
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes"
            -f "tag_name=$TAG_NAME"
            -f "target_commitish=$TARGET_SHA"
          )

          if [ -n "$PREVIOUS_TAG" ]; then
            api_args+=(-f "previous_tag_name=$PREVIOUS_TAG")
          fi

          gh api "${api_args[@]}" --jq '.body' > "$BASE_NOTES_FILE"
          cp "$BASE_NOTES_FILE" "$NOTES_FILE"

          latest_flag=()
          if [ "$MARK_LATEST" = "true" ]; then
            latest_flag=(--latest)
          fi

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$TARGET_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE" \
              "${latest_flag[@]}"

            gh release upload "$TAG_NAME" \
              dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG_NAME" \
              dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$TARGET_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE" \
              --verify-tag \
              "${latest_flag[@]}"
          fi
